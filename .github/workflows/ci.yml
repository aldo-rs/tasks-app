name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Lint
        run: npm run lint:check

      - name: Unit tests
        run: npm run test:unit -- --run

      - name: Build
        run: npm run build

